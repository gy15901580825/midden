name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# GoReleaser then cross-compiles every target and attaches the archives
# to a GitHub release (created as a draft — publish it from the Releases
# page after a look).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
